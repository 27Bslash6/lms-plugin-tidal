name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (must match install.xml)'
        required: true
      dry_run:
        description: 'Dry run (skip push and release)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set Version
        id: set-version
        run:
          echo "version=$(egrep -o 'version>(.*)</version' install.xml | egrep -o '[0-9.]*')" >> $GITHUB_OUTPUT

      - name: Validate Version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          DETECTED_VERSION: ${{ steps.set-version.outputs.version }}
        run: |
          if [ "${INPUT_VERSION}" != "${DETECTED_VERSION}" ]; then
            echo "::error::Input version '${INPUT_VERSION}' does not match install.xml version '${DETECTED_VERSION}'"
            exit 1
          fi

      - name: Zip Repository
        id: zip
        run: zip TIDAL -r API *.pm HTML Settings install.xml strings.txt README.md custom-convert.conf custom-types.conf

      - name: Setup Perl
        run: |
          sudo apt-get install -y libxml-simple-perl

      - name: Update SHA and Version in repo.xml
        id: tag
        env:
          VERSION: ${{ steps.set-version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          url="https://github.com/${REPO}/releases/download/${VERSION}"
          perl repo/release.pl repo/repo.xml "${VERSION}" TIDAL.zip "${url}"

      - name: Update Repository
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          VERSION: ${{ steps.set-version.outputs.version }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add repo/repo.xml
          git commit -m "Update repo.xml for release ${VERSION}"
          git push origin HEAD:main

      - name: Create Release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        id: create_release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2.6.1
        with:
          tag_name: ${{ steps.set-version.outputs.version }}
          name: Version ${{ steps.set-version.outputs.version }}
          body: TIDAL plugin release
          draft: false
          prerelease: false
          files: TIDAL.zip
